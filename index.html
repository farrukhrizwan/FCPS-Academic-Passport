		* {
    box-sizing: border-box;
}
        :root { --primary: #1a237e; --accent: #ffd700; --card-bg: rgba(255, 255, 255, 0.95); }

        h1 { margin: 0; font-size: 18px; text-transform: uppercase; }
        h2 { margin: 0; font-size: 12px; color: var(--accent); font-weight: 300; }
        .search-box { padding: 15px; text-align: center; position: sticky; top: 110px; z-index: 10; }
        #vocabSearch { width: 85%; max-width: 400px; padding: 12px 20px; border-radius: 25px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); outline: none; }
        .container { width: 100%; padding: 10px 15px 100px 15px; max-width: 800px; margin: auto; }
        .grade-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .grade-header { padding: 15px 20px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 600; color: var(--primary); border-bottom: 1px solid #eee; }
        .word-grid { display: none; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .word-tag { background: #f8f9fa; padding: 6px; border-radius: 6px; font-size: 14px; text-align: center; border: 1px solid #eee; transition: 0.2s; }
        .word-tag:hover { background: var(--accent); color: var(--primary); font-weight: bold; }
        .show { display: grid !important; }
        footer { position: fixed; bottom: 0; width: 100%; background: white; color: black; padding: 10px 0; text-align: center; font-size: 10px; border-top: 1px solid var(--accent); }

    const container = document.getElementById('mainContainer');

    // Build the UI
    Object.keys(vocabulary).forEach((grade, index) => {
        const id = `grade${index}`;
        const card = document.createElement('div');
        card.className = 'grade-card';
        card.innerHTML = `
            <div class="grade-header" onclick="toggle('${id}')">${grade} <span>+</span></div>
            <div id="${id}" class="word-grid">
                ${vocabulary[grade].map(word => `<div class="word-tag">${word}</div>`).join('')}
            </div>
        `;
        container.appendChild(card);
    });

    function toggle(id) {
        const el = document.getElementById(id);
        const span = el.previousElementSibling.querySelector('span');
        el.classList.toggle('show');
        span.innerText = el.classList.contains('show') ? '−' : '+';
    }

    function filterWords() {
        const input = document.getElementById('vocabSearch').value.toLowerCase();
        const tags = document.getElementsByClassName('word-tag');
        for (let tag of tags) {
            const isMatch = tag.innerText.toLowerCase().includes(input);
            tag.style.display = isMatch ? "" : "none";
            if (isMatch && input.length > 1) tag.parentElement.classList.add('show');
        }
    }
	let deferredPrompt;
		const installBanner = document.getElementById('installBanner');
		const installBtn = document.getElementById('installBtn');

	window.addEventListener('beforeinstallprompt', (e) => {
    // Prevent the default mini-infobar from appearing on mobile
    e.preventDefault();
    // Stash the event so it can be triggered later.
    deferredPrompt = e;
    // Update UI notify the user they can install the PWA
    installBanner.style.display = 'block';

    installBtn.addEventListener('click', () => {
        // Hide the app provided install promotion
        installBanner.style.display = 'none';
        // Show the install prompt
        deferredPrompt.prompt();
        // Wait for the user to respond to the prompt
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
            } else {
                console.log('User dismissed the install prompt');
            }
            deferredPrompt = null;
        });
    });
});

// Hide banner if app is already installed
	window.addEventListener('appinstalled', () => {
    installBanner.style.display = 'none';
		console.log('PWA was installed');
});
		// Register Service Worker for Offline Power & Install Button
		if ('serviceWorker' in navigator) {
		window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Failed', err));
    });
